name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: Verify fresh clone
        run: npm.cmd run verify:fresh

      - name: Run complete test suite
        run: npm.cmd test

      - name: Check npm package contents
        run: npm.cmd pack --dry-run

      - name: Build public release package
        run: npm.cmd run package:public

      - name: Verify public release package
        run: npm.cmd run verify:public-zip

      - name: Compute release variables
        id: vars
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $version = $pkg.version
          $zip = "dist/CodexJournal-Lite-v$version-public.zip"
          if (-not (Test-Path $zip)) {
            throw "Missing release zip: $zip"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip=$zip" >> $env:GITHUB_OUTPUT
          "zip_name=CodexJournal-Lite-v$version-public.zip" >> $env:GITHUB_OUTPUT

      - name: Generate SHA256
        shell: pwsh
        run: |
          $zip = "${{ steps.vars.outputs.zip }}"
          $zipName = "${{ steps.vars.outputs.zip_name }}"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zipName" | Out-File "$zip.sha256" -Encoding ascii
          Get-Content "$zip.sha256"

      - name: Build release notes from CHANGELOG
        shell: pwsh
        run: |
          $version = "${{ steps.vars.outputs.version }}"
          $changelog = Get-Content CHANGELOG.md -Raw
          $escapedVersion = [regex]::Escape($version)
          $pattern = "(?ms)^## \[$escapedVersion\][^\r\n]*\r?\n.*?(?=^## \[|\z)"
          $match = [regex]::Match($changelog, $pattern)
          if (-not $match.Success) {
            throw "CHANGELOG.md has no release section for $version"
          }
          $notes = "# CodexJournal-Lite v$version`n`n" + $match.Value.Trim() + "`n"
          Set-Content -LiteralPath release-notes.md -Value $notes -Encoding utf8

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: CodexJournal-Lite v${{ steps.vars.outputs.version }}
          tag_name: v${{ steps.vars.outputs.version }}
          body_path: release-notes.md
          files: |
            ${{ steps.vars.outputs.zip }}
            ${{ steps.vars.outputs.zip }}.sha256
