name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Windows)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: Verify fresh clone
        run: npm.cmd run verify:fresh

      - name: Run offline fixture tests
        run: npm.cmd run test:sources

      - name: Run sanitizer regression tests
        run: npm.cmd run test:sanitize

      - name: Dry-run npm pack
        run: npm.cmd pack --dry-run

      - name: Build public release package
        run: npm.cmd run package:public

      - name: Verify public release package
        run: npm.cmd run verify:public-zip

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Scan Git history
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  gate:
    name: CI gate
    if: always()
    needs: [verify, secrets]
    runs-on: ubuntu-latest
    steps:
      - name: Require all checks
        shell: bash
        run: |
          test "${{ needs.verify.result }}" = "success"
          test "${{ needs.secrets.result }}" = "success"
