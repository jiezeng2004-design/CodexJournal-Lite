name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }}, Node ${{ matrix.node-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Verify fresh clone
        shell: bash
        run: npm run verify:fresh

      - name: Run complete test suite
        shell: bash
        run: npm test

      - name: Smoke test
        shell: bash
        run: npm run smoke

      - name: Dry-run npm pack
        shell: bash
        run: npm pack --dry-run

      - name: Build public release package
        if: matrix.os == 'windows-latest'
        shell: bash
        run: npm run package:public

      - name: Verify public release package
        if: matrix.os == 'windows-latest'
        shell: bash
        run: npm run verify:public-zip

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Scan Git history
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  gate:
    name: CI gate
    if: always()
    needs: [verify, secrets]
    runs-on: ubuntu-latest
    steps:
      - name: Require all checks
        shell: bash
        run: |
          test "${{ needs.verify.result }}" = "success"
          test "${{ needs.secrets.result }}" = "success"
